# Project identification
sonar.projectKey=cv-portfolio-builder
sonar.organization=your-github-organization
sonar.projectName=CV Portfolio Builder
sonar.projectVersion=1.0.0

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test configuration
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.tsx,**/*.test.ts,**/node_modules/**/*,**/dist/**/*,**/coverage/**/*,**/public/**/*,**/*.config.js,**/*.config.ts

# Quality gate settings
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.tsx,**/*.test.ts

# Issue severity
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignore some rules for test files
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1134
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.tsx

# Ignore TODO comments in tests
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.tsx

# Ignore code smells in test files
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1134
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.test.tsx
